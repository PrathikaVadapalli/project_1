<!DOCTYPE html>
<html>
<head>
<title>Login - Connect2Wed</title>

<style>

body{
font-family: Arial;
background: linear-gradient(to right,#ff758c,#ff7eb3);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.login-container{
background:white;
padding:40px;
width:350px;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.2);
text-align:center;
}

h1{
color:#c2185b;
margin-bottom:25px;
}

input{
width:90%;
padding:12px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
}

button{
width:95%;
padding:12px;
background:#c2185b;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#880e4f;
}

.back-btn{
background:#4CAF50;
margin-top:10px;
}

.back-btn:hover{
background:#2e7d32;
}

</style>

</head>

<body>

<div class="login-container">

<h1>Login</h1>

<form>

<input type="email" placeholder="Enter Email" required>

<input type="password" placeholder="Enter Password" required>

<button type="submit">Login</button>

</form>

<a href="file1.html">
<button class="back-btn">Back to Register</button>
</a>

</div>

</body>
</html>
