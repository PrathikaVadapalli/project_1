<!DOCTYPE html>
<html>
<head>
<title>Login - Connect2Wed</title>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(to right,#ff758c,#ff7eb3);
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:white;
width:360px;
padding:35px;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.2);
text-align:center;
}

h1{
color:#c2185b;
margin-bottom:25px;
}

input{
width:90%;
padding:12px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
}

button{
width:95%;
padding:12px;
background:#c2185b;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#880e4f;
}

.back{
display:block;
margin-top:15px;
text-decoration:none;
color:#555;
}

.back:hover{
color:#c2185b;
}

</style>

</head>

<body>

<div class="login-box">

<h1>Login</h1>

<form>

<input type="email" placeholder="Email Address" required>

<input type="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<a class="back" href="file1.html">Back to Register</a>

</div>

</body>
</html>
