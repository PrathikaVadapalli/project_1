<!DOCTYPE html>
<html>
<head>
<title>Connect2Wed</title>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(to right,#ff9a9e,#fad0c4);
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
width:380px;
padding:35px;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.2);
text-align:center;
}

h1{
color:#c2185b;
margin-bottom:5px;
}

.tagline{
color:#777;
margin-bottom:20px;
}

input,select{
width:90%;
padding:12px;
margin:8px 0;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
}

button{
width:95%;
padding:12px;
background:#c2185b;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#880e4f;
}

</style>

</head>

<body>

<div class="container">

<h1>Connect2Wed</h1>
<p class="tagline">Turning Connections into Commitments</p>

<form action="profile.html">

<input type="text" placeholder="Full Name" required>

<input type="email" placeholder="Email Address" required>

<label>Date of Birth</label>
<input type="date" required>

<select required>
<option value="">Select Marital Status</option>
<option>Single</option>
<option>Divorced</option>
<option>Married</option>
</select>

<input type="text" placeholder="Education">

<input type="text" placeholder="Profession">

<button type="submit">Create Profile</button>

</form>

</div>

</body>
</html>
