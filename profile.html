<!DOCTYPE html>
<html>
<head>
<title>Profile Created</title>

<style>

body{
font-family: Arial;
background: linear-gradient(to right,#ff9a9e,#fad0c4);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:white;
padding:40px;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.2);
text-align:center;
width:380px;
}

h1{
color:#c2185b;
}

.success{
color:green;
font-weight:bold;
margin-bottom:15px;
}

.info{
background:#f9f9f9;
padding:15px;
border-radius:8px;
margin-top:10px;
text-align:left;
}

button{
background:#c2185b;
color:white;
border:none;
padding:12px 20px;
border-radius:6px;
cursor:pointer;
margin-top:20px;
}

button:hover{
background:#880e4f;
}

</style>

</head>

<body>

<div class="box">

<h1>Connect2Wed</h1>

<p class="success">🎉 Profile Created Successfully!</p>

<div class="info">

<p><b>Zodiac Sign:</b> <span id="zodiac"></span></p>

<p><b>Compatibility Insight:</b> Best matches depend on zodiac harmony.</p>

<p><b>Trust Level:</b> Verified Profile</p>

</div>

<p>Your profile is now active. Start exploring matches.</p>

<a href="home.html">
<button>Go to Dashboard</button>
</a>

</div>

<script>

function getZodiac(day, month){

if((month==3 && day>=21)||(month==4 && day<=19)) return "Aries";
if((month==4 && day>=20)||(month==5 && day<=20)) return "Taurus";
if((month==5 && day>=21)||(month==6 && day<=20)) return "Gemini";
if((month==6 && day>=21)||(month==7 && day<=22)) return "Cancer";
if((month==7 && day>=23)||(month==8 && day<=22)) return "Leo";
if((month==8 && day>=23)||(month==9 && day<=22)) return "Virgo";
if((month==9 && day>=23)||(month==10 && day<=22)) return "Libra";
if((month==10 && day>=23)||(month==11 && day<=21)) return "Scorpio";
if((month==11 && day>=22)||(month==12 && day<=21)) return "Sagittarius";
if((month==12 && day>=22)||(month==1 && day<=19)) return "Capricorn";
if((month==1 && day>=20)||(month==2 && day<=18)) return "Aquarius";
return "Pisces";

}

const params = new URLSearchParams(window.location.search);
const dob = params.get("dob");

if(dob){

let date = new Date(dob);
let day = date.getDate();
let month = date.getMonth()+1;

document.getElementById("zodiac").innerText = getZodiac(day,month);

}

</script>

</body>
</html>
