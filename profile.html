<!DOCTYPE html>
<html>
<head>
<title>Connect2Wed Dashboard</title>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
background:#f5f5f5;
}

.navbar{
background:#c2185b;
color:white;
padding:15px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
width:80%;
margin:auto;
margin-top:50px;
display:flex;
justify-content:space-around;
flex-wrap:wrap;
}

.card{
background:white;
padding:25px;
margin:20px;
border-radius:12px;
box-shadow:0 6px 15px rgba(0,0,0,0.15);
width:250px;
text-align:center;
}

.card h3{
color:#c2185b;
margin-bottom:10px;
}

.card p{
color:#444;
}

button{
background:#c2185b;
color:white;
border:none;
padding:10px 18px;
border-radius:6px;
cursor:pointer;
margin-top:10px;
font-size:14px;
}

button:hover{
background:#880e4f;
}

</style>

</head>

<body>

<div class="navbar">
Connect2Wed
</div>

<div class="container">

<div class="card">
<h3>View Matches</h3>
<p>See compatible profiles based on your preferences.</p>
<button>Explore</button>
</div>

<div class="card">
<h3>Compatibility</h3>
<p>Check compatibility and horoscope insights.</p>
<button>Check</button>
</div>

<div class="card">
<h3>Your Profile</h3>
<p>Update your profile and preferences.</p>
<button>Edit</button>
</div>

</div>

</body>
</html>
