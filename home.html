<!DOCTYPE html>
<html>
<head>
<title>Connect2Wed Dashboard</title>

<style>

body{
font-family: Arial;
margin:0;
background:#f8f8f8;
}

.navbar{
background:#c2185b;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

.container{
width:80%;
margin:auto;
margin-top:40px;
text-align:center;
}

.card{
background:white;
padding:20px;
margin:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
display:inline-block;
width:250px;
}

.card h3{
color:#c2185b;
}

button{
background:#c2185b;
color:white;
border:none;
padding:10px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#880e4f;
}

</style>

</head>

<body>

<div class="navbar">
Connect2Wed
</div>

<div class="container">

<div class="card">
<h3>View Matches</h3>
<p>See compatible profiles based on your preferences.</p>
<button>Explore</button>
</div>

<div class="card">
<h3>Compatibility</h3>
<p>Check horoscope and compatibility score.</p>
<button>Check</button>
</div>

<div class="card">
<h3>Your Profile</h3>
<p>Update your personal information.</p>
<button>Edit</button>
</div>

</div>

</body>
</html>
